<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Holder Analyzer</title>
  <style>
    :root {
      --bg: #061427;
      --card: #102c4f;
      --card-border: #1f4b7a;
      --text: #eaf2ff;
      --muted: #9fb8d6;
      --good: #5dd39e;
      --bad: #ff8080;
      --pill-contract: #2f6bd6;
      --pill-wallet: #2a9d8f;
      --pill-exchange: #c17a00;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, #164174 0%, transparent 36%),
        radial-gradient(circle at 85% 88%, #0b2f5f 0%, transparent 35%),
        linear-gradient(160deg, #061427 0%, #040d1a 100%);
      padding: 20px;
    }

    .wrap {
      width: min(1200px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 30px);
    }

    .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .card {
      background: linear-gradient(180deg, #12345d 0%, var(--card) 100%);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.42);
      padding: 14px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 170px 1fr 140px;
      gap: 10px;
    }

    select,
    input,
    button {
      width: 100%;
      border: 1px solid rgba(108, 156, 214, 0.35);
      border-radius: 10px;
      background: rgba(7, 24, 46, 0.72);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    button {
      background: #1b5fc0;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      margin-top: 8px;
      font-size: 13px;
      min-height: 18px;
    }

    .ok {
      color: var(--good);
    }

    .err {
      color: var(--bad);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      border: 1px solid rgba(108, 156, 214, 0.28);
      border-radius: 10px;
      background: rgba(7, 24, 46, 0.62);
      padding: 8px 10px;
    }

    .metric .k {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 3px;
    }

    .metric .v {
      font-size: 14px;
      font-weight: 700;
    }

    .table-wrap {
      border: 1px solid rgba(108, 156, 214, 0.3);
      border-radius: 10px;
      overflow: auto;
      max-height: 520px;
      background: rgba(7, 24, 46, 0.62);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0d2b50;
      color: #b8d0ec;
      text-align: left;
      padding: 8px;
      border-bottom: 1px solid rgba(108, 156, 214, 0.3);
    }

    tbody td {
      padding: 8px;
      border-bottom: 1px solid rgba(108, 156, 214, 0.2);
      vertical-align: top;
    }

    .mono {
      font-family: Consolas, "Courier New", monospace;
      font-size: 11px;
      color: #d9e8ff;
      line-height: 1.35;
      word-break: break-all;
    }

    .holder-name {
      display: block;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      color: #fff;
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
    }

    .pill-contract { background: var(--pill-contract); }
    .pill-wallet { background: var(--pill-wallet); }
    .pill-exchange { background: var(--pill-exchange); }

    .hidden {
      display: none;
    }

    @media (max-width: 900px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Token Holder Analyzer</h1>
    <p class="sub">Select chain, enter CA, analyze top holders.</p>

    <section class="card">
      <form id="analyzeForm" class="form-grid">
        <select id="chain" required>
          <option value="eth">Ethereum (ETH)</option>
          <option value="bsc">BNB Smart Chain (BSC)</option>
        </select>
        <input id="ca" type="text" placeholder="0x... (40 hex)" required />
        <button id="analyzeBtn" type="submit">Analyze</button>
      </form>
      <div class="hint">Example: <span class="mono">0x0e63b9c287e32a05e6b9ab8ee8df88a2760225a9</span></div>
      <div id="status" class="status"></div>
    </section>

    <section id="resultCard" class="card hidden">
      <div id="metrics" class="metrics"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Holder</th>
              <th>Type</th>
              <th>%</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="holdersBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/client.js"></script>
</body>
</html>
